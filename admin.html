<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Trị - Casino Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --accent: #ffca28;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --sidebar-w: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        .sidebar {
            width: var(--sidebar-w);
            background: #020617;
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 1.5rem; color: var(--accent); margin-bottom: 40px; text-align: center; letter-spacing: 2px; }
        .nav-menu { flex: 1; list-style: none; }
        .nav-item {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            font-weight: 600;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255, 202, 40, 0.1); color: var(--accent); }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-title { font-size: 1.8rem; font-weight: 800; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-label { color: var(--text-muted); font-size: 0.9rem; font-weight: 600; display: block; margin-bottom: 10px; }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--accent); }

        .table-container {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; color: var(--text-muted); border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; }
        td { padding: 18px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.95rem; }
        
        .badge { padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        .badge-pending { background: rgba(255, 202, 40, 0.1); color: var(--accent); }
        .badge-success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        .btn {
            padding: 8px 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            transition: 0.2s;
            margin-right: 5px;
        }
        .btn-approve { background: var(--success); color: #fff; }
        .btn-reject { background: var(--danger); color: #fff; }

        .content-section { display: none; }
        .content-section.active { display: block; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">ADMIN CP</div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="switchTab(this, 'dashboard')"><i class="fas fa-home"></i> Tổng quan</li>
            <li class="nav-item" onclick="switchTab(this, 'users')"><i class="fas fa-users"></i> Người dùng</li>
            <li class="nav-item" onclick="switchTab(this, 'deposits')"><i class="fas fa-arrow-down"></i> Duyệt Nạp tiền</li>
            <li class="nav-item" onclick="switchTab(this, 'withdraws')"><i class="fas fa-arrow-up"></i> Duyệt Rút tiền</li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1 class="page-title" id="tab-title">Tổng quan</h1>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-approve" onclick="location.reload()">Làm mới dữ liệu</button>
            </div>
        </header>

        <!-- DASHBOARD -->
        <section id="dashboard-sec" class="content-section active">
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-label">Tổng người chơi</span><span class="stat-value" id="stat-users">0</span></div>
                <div class="stat-card"><span class="stat-label">Đơn nạp chờ</span><span class="stat-value" id="stat-dep">0</span></div>
                <div class="stat-card"><span class="stat-label">Đơn rút chờ</span><span class="stat-value" id="stat-wit">0</span></div>
                <div class="stat-card"><span class="stat-label">Trạng thái</span><span class="stat-value" style="color: var(--success);">ONLINE</span></div>
            </div>
        </section>

        <!-- USERS -->
        <section id="users-sec" class="content-section">
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Người dùng</th><th>Số dư</th><th>Ngày tham gia</th><th>Thao tác</th></tr>
                    </thead>
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>
        </section>

        <!-- DEPOSITS -->
        <section id="deposits-sec" class="content-section">
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Tài khoản</th><th>Nội dung</th><th>Số tiền</th><th>Hành động</th></tr>
                    </thead>
                    <tbody id="deposit-table-body"></tbody>
                </table>
            </div>
        </section>

        <!-- WITHDRAWALS -->
        <section id="withdraws-sec" class="content-section">
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Tài khoản</th><th>Ngân hàng / STK</th><th>Số tiền</th><th>Hành động</th></tr>
                    </thead>
                    <tbody id="withdraw-table-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io();

        function switchTab(el, tabId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            const section = document.getElementById(tabId + '-sec');
            if(section) section.classList.add('active');
            document.getElementById('tab-title').innerText = el.innerText;

            if(tabId === 'users') loadUsers();
            if(tabId === 'deposits') loadDeposits();
            if(tabId === 'withdraws') loadWithdrawals();
            updateStats();
        }

        function loadUsers() {
            // Hiện tại users vẫn lấy demo hoặc từ server nếu bạn muốn mở rộng thêm API get users
            const body = document.getElementById('user-table-body');
            body.innerHTML = '<tr><td colspan="4" style="text-align:center;">Dữ liệu người dùng đồng bộ từ Database</td></tr>';
        }

        function loadDeposits() {
            socket.emit('getPendingDeposits');
        }

        socket.on('receivePendingDeposits', (data) => {
            const body = document.getElementById('deposit-table-body');
            body.innerHTML = data.length ? '' : '<tr><td colspan="4" style="text-align:center;">Không có đơn nạp chờ duyệt</td></tr>';
            data.forEach((d) => {
                body.innerHTML += `<tr>
                    <td><b>${d.user}</b></td>
                    <td style="color: var(--accent); font-family: monospace;">${d.memo}</td>
                    <td>${(d.amount || 0).toLocaleString()}</td>
                    <td>
                        <button class="btn btn-approve" onclick="processDep('${d._id}')">Duyệt</button>
                    </td>
                </tr>`;
            });
        });

        socket.on('depositStatusUpdated', (dep) => {
            loadDeposits();
            updateStats();
        });

        socket.on('newDepositNotification', (dep) => {
            console.log("Có đơn nạp mới!");
            loadDeposits();
        });

        function loadWithdrawals() {
            const data = JSON.parse(localStorage.getItem('casino_withdrawals') || '[]');
            const body = document.getElementById('withdraw-table-body');
            body.innerHTML = data.length ? '' : '<tr><td colspan="4" style="text-align:center;">Không có đơn rút</td></tr>';
            data.reverse().forEach((w, i) => {
                const idx = data.length - 1 - i;
                body.innerHTML += `<tr>
                    <td>${w.user}</td>
                    <td>${w.bank}<br><small>${w.account}</small></td>
                    <td style="color: var(--danger);">-${w.amount}</td>
                    <td>
                        ${w.status === 'Pending' ? 
                        `<button class="btn btn-approve" onclick="processWit(${idx}, 'Approved')">Duyệt Chi</button>` : 
                        `<span class="badge badge-success">${w.status}</span>`}
                    </td>
                </tr>`;
            });
        }

        function processDep(id) {
            if(confirm("Duyệt đơn nạp này và cộng tiền cho user?")) {
                socket.emit('approveDeposit', id);
            }
        }

        function processWit(idx, status) {
            let data = JSON.parse(localStorage.getItem('casino_withdrawals'));
            data[idx].status = status;
            localStorage.setItem('casino_withdrawals', JSON.stringify(data));
            loadWithdrawals();
            updateStats();
        }

        function updateStats() {
            // Cập nhật thống kê tạm thời
            socket.emit('getPendingDeposits');
        }

        window.onload = () => {
            updateStats();
            loadDeposits();
        };
    </script>
</body>
</html>
