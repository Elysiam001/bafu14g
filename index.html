<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài Xỉu Bafu - Cổng Game Uy Tín Hàng Đầu</title>
    <meta name="description" content="Chào mừng đến với Tài Xỉu Bafu - Cổng game giải trí đỉnh cao.">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="site-wrapper">
        <!-- Navigation Header -->
        <header class="main-header">
            <nav class="navbar">
                <div class="nav-logo">
                    <span>BAFU</span>CASINO
                </div>
                
                <ul class="nav-links" id="nav-links">
                    <li><a href="#"><i class="fas fa-home"></i> Trang Chủ</a></li>
                    <li><a href="#"><i class="fas fa-gamepad"></i> Trò Chơi</a></li>
                    <li><a href="#"><i class="fas fa-gift"></i> Khuyến Mãi</a></li>
                    <li><a href="#"><i class="fas fa-headset"></i> Hỗ Trợ</a></li>
                </ul>

                <div class="menu-toggle" id="mobile-menu">
                    <i class="fas fa-bars"></i>
                </div>
            </nav>
        </header>

        <main class="auth-section">
            <div class="auth-container">
                <!-- Logo Header -->
                <div class="header-logo">
                    <img src="assets/images/logo_floating.png" alt="Tài Xỉu Bafu Logo">
                </div>

                <div class="auth-card">
                    <!-- Form Login -->
                    <form id="login-form" class="auth-form active">
                        <h2 class="form-title">ĐĂNG NHẬP</h2>
                        
                        <div class="form-group">
                            <div class="input-wrapper">
                                <i class="fas fa-user"></i>
                                <input type="text" id="login-username" placeholder="Tên Đăng Nhập" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="login-password" placeholder="Mật Khẩu" required>
                                <i class="fas fa-eye-slash toggle-pass"></i>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-container">
                                <input type="checkbox">
                                <span class="checkmark"></span>
                                GHI NHỚ
                            </label>
                            <a href="#" class="forgot-pass">QUÊN MẬT KHẨU?</a>
                        </div>

                        <button type="submit" class="submit-btn btn-red">ĐĂNG NHẬP</button>

                        <div class="divider">
                            <span>HOẶC</span>
                        </div>

                        <div class="social-login">
                            <button type="button" class="social-btn facebook">
                                <i class="fab fa-facebook-f"></i> Facebook
                            </button>
                            <button type="button" class="social-btn google">
                                <i class="fab fa-google"></i> Google
                            </button>
                        </div>

                        <div class="form-footer">
                            <span>Chưa có tài khoản?</span>
                            <a href="javascript:void(0)" id="to-register">Đăng Ký Ngay</a>
                        </div>
                    </form>

                    <!-- Form Register -->
                    <form id="register-form" class="auth-form">
                        <h2 class="form-title">ĐĂNG KÝ</h2>
                        
                        <div class="form-group">
                            <div class="input-wrapper">
                                <i class="fas fa-user"></i>
                                <input type="text" id="reg-username" placeholder="Tên Đăng Nhập" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <div class="input-wrapper">
                                <i class="fas fa-envelope"></i>
                                <input type="email" id="reg-email" placeholder="Địa chỉ Email" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="reg-password" placeholder="Mật Khẩu" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="reg-confirm-password" placeholder="Nhập Lại Mật Khẩu" required>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-container">
                                <input type="checkbox" checked>
                                <span class="checkmark"></span>
                                Tôi đồng ý với <u>Điều Khoản</u>
                            </label>
                        </div>

                        <button type="submit" class="submit-btn btn-gold">TẠO TÀI KHOẢN</button>

                        <div class="form-footer">
                            <span>Đã có tài khoản?</span>
                            <a href="javascript:void(0)" id="to-login">Đăng Nhập</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
